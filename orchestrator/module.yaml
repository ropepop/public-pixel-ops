schema: 1
module_id: orchestrator
owner: pixel-ops
runtime:
  type: service
  healthcheck: orchestrator/scripts/android/deploy_orchestrator_apk.sh --action health --skip-build
  run_id_env: PIXEL_RUN_ID
components:
  - id: dns
    start: sh /data/local/pixel-stack/bin/pixel-dns-start.sh
    stop: sh /data/local/pixel-stack/bin/pixel-dns-stop.sh
    health: ss -ltn 2>/dev/null | grep -E '[:.]53[[:space:]]' >/dev/null
    redeploy:
      mode: artifact_release
      artifact_id: adguardhome-rootfs
  - id: ssh
    start: sh /data/local/pixel-stack/bin/pixel-ssh-start.sh
    stop: sh /data/local/pixel-stack/bin/pixel-ssh-stop.sh
    health: ss -ltn 2>/dev/null | grep -E '[:.]2222[[:space:]]' >/dev/null
    redeploy:
      mode: artifact_release
      artifact_id: dropbear-bundle
  - id: vpn
    start: sh /data/local/pixel-stack/bin/pixel-vpn-start.sh
    stop: sh /data/local/pixel-stack/bin/pixel-vpn-stop.sh
    health: sh /data/local/pixel-stack/bin/pixel-vpn-health.sh
    redeploy:
      mode: artifact_release
      artifact_id: tailscale-bundle
  - id: ddns
    start: sh /data/local/pixel-stack/bin/pixel-ddns-sync.sh
    stop: "true"
    health: epoch=$(cat /data/local/pixel-stack/run/ddns-last-sync-epoch 2>/dev/null || true); case "$epoch" in ''|*[!0-9]*) exit 1;; esac; now=$(date +%s); age=$((now - epoch)); [ "$age" -ge 0 ] && [ "$age" -le 600 ]
    redeploy:
      mode: job
  - id: remote
    start: "true"
    stop: "true"
    health: ss -ltn 2>/dev/null | grep -E '[:.]443[[:space:]]' >/dev/null
    redeploy:
      mode: derived
      derived_from: dns
  - id: train_bot
    start: sh /data/local/pixel-stack/bin/pixel-train-start.sh
    stop: sh /data/local/pixel-stack/bin/pixel-train-stop.sh
    health: pid=$(cat /data/local/pixel-stack/apps/train-bot/run/train-bot.pid 2>/dev/null || true); [ -n "$pid" ] && kill -0 "$pid" >/dev/null 2>&1
    redeploy:
      mode: artifact_release
      artifact_id: train-bot-bundle
      release_root: /data/local/pixel-stack/apps/train-bot/releases
  - id: satiksme_bot
    start: sh /data/local/pixel-stack/bin/pixel-satiksme-start.sh
    stop: sh /data/local/pixel-stack/bin/pixel-satiksme-stop.sh
    health: sh /data/local/pixel-stack/bin/pixel-satiksme-health.sh
    redeploy:
      mode: artifact_release
      artifact_id: satiksme-bot-bundle
      release_root: /data/local/pixel-stack/apps/satiksme-bot/releases
  - id: site_notifier
    start: sh /data/local/pixel-stack/bin/pixel-notifier-start.sh
    stop: sh /data/local/pixel-stack/bin/pixel-notifier-stop.sh
    health: pid=$(cat /data/local/pixel-stack/apps/site-notifications/run/site-notifier.pid 2>/dev/null || true); [ -n "$pid" ] && kill -0 "$pid" >/dev/null 2>&1
    redeploy:
      mode: artifact_release
      artifact_id: site-notifier-bundle
      release_root: /data/local/pixel-stack/apps/site-notifications/releases
observability:
  event_source: android_orchestrator
  evidence_root: ops/evidence/orchestrator
