schema: 1
version: 1
modules:
  - id: dns
    display_name: DNS
    domain: orchestrator
    runtime_type: rooted_service
    owner_path: orchestrator/android-orchestrator
    health_key: dnsHealthy
    component_id: dns
    start_command: sh /data/local/pixel-stack/bin/pixel-dns-start.sh
    stop_command: sh /data/local/pixel-stack/bin/pixel-dns-stop.sh
    health_command: ss -ltn 2>/dev/null | grep -E '[:.]53[[:space:]]' >/dev/null
    redeploy:
      mode: artifact_release
      artifact_id: adguardhome-rootfs
  - id: ssh
    display_name: SSH
    domain: orchestrator
    runtime_type: rooted_service
    owner_path: orchestrator/android-orchestrator
    health_key: sshHealthy
    component_id: ssh
    start_command: sh /data/local/pixel-stack/bin/pixel-ssh-start.sh
    stop_command: sh /data/local/pixel-stack/bin/pixel-ssh-stop.sh
    health_command: ss -ltn 2>/dev/null | grep -E '[:.]2222[[:space:]]' >/dev/null
    redeploy:
      mode: artifact_release
      artifact_id: dropbear-bundle
  - id: vpn
    display_name: VPN
    domain: orchestrator
    runtime_type: rooted_service
    owner_path: orchestrator/android-orchestrator
    health_key: vpnHealthy
    component_id: vpn
    start_command: sh /data/local/pixel-stack/bin/pixel-vpn-start.sh
    stop_command: sh /data/local/pixel-stack/bin/pixel-vpn-stop.sh
    health_command: sh /data/local/pixel-stack/bin/pixel-vpn-health.sh
    redeploy:
      mode: artifact_release
      artifact_id: tailscale-bundle
  - id: ddns
    display_name: DDNS
    domain: orchestrator
    runtime_type: job
    owner_path: orchestrator/android-orchestrator
    health_key: ddnsHealthy
    component_id: ddns
    start_command: sh /data/local/pixel-stack/bin/pixel-ddns-sync.sh
    stop_command: true
    health_command: epoch=$(cat /data/local/pixel-stack/run/ddns-last-sync-epoch 2>/dev/null || true); case "$epoch" in ''|*[!0-9]*) exit 1;; esac; now=$(date +%s); age=$((now - epoch)); [ "$age" -ge 0 ] && [ "$age" -le 600 ]
    redeploy:
      mode: job
  - id: remote
    display_name: Remote Endpoint Contract
    domain: orchestrator
    runtime_type: synthetic_health
    owner_path: orchestrator/android-orchestrator
    health_key: remoteHealthy
    component_id: remote
    start_command: true
    stop_command: true
    health_command: ss -ltn 2>/dev/null | grep -E '[:.]443[[:space:]]' >/dev/null
    redeploy:
      mode: derived
      derived_from: dns
  - id: management
    display_name: Management Path
    domain: orchestrator
    runtime_type: synthetic_health
    owner_path: orchestrator/android-orchestrator
    health_key: managementHealthy
    component_id: management
    start_command: true
    stop_command: true
    health_command: sh /data/local/pixel-stack/bin/pixel-management-health.sh
    redeploy:
      mode: derived
      derived_from: vpn
  - id: train_bot
    display_name: Train Bot
    domain: workloads
    runtime_type: rooted_service
    owner_path: workloads/train-bot
    health_key: trainBotHealthy
    component_id: train_bot
    start_command: sh /data/local/pixel-stack/bin/pixel-train-start.sh
    stop_command: sh /data/local/pixel-stack/bin/pixel-train-stop.sh
    health_command: pid=$(cat /data/local/pixel-stack/apps/train-bot/run/train-bot.pid 2>/dev/null || true); [ -n "$pid" ] && kill -0 "$pid" >/dev/null 2>&1
    redeploy:
      mode: artifact_release
      artifact_id: train-bot-bundle
      release_root: /data/local/pixel-stack/apps/train-bot/releases
  - id: satiksme_bot
    display_name: Satiksme Bot
    domain: workloads
    runtime_type: rooted_service
    owner_path: workloads/satiksme-bot
    health_key: satiksmeBotHealthy
    component_id: satiksme_bot
    start_command: sh /data/local/pixel-stack/bin/pixel-satiksme-start.sh
    stop_command: sh /data/local/pixel-stack/bin/pixel-satiksme-stop.sh
    health_command: sh /data/local/pixel-stack/bin/pixel-satiksme-health.sh
    redeploy:
      mode: artifact_release
      artifact_id: satiksme-bot-bundle
      release_root: /data/local/pixel-stack/apps/satiksme-bot/releases
  - id: site_notifier
    display_name: Site Notifications
    domain: workloads
    runtime_type: rooted_service
    owner_path: workloads/site-notifications
    health_key: siteNotifierHealthy
    component_id: site_notifier
    start_command: sh /data/local/pixel-stack/bin/pixel-notifier-start.sh
    stop_command: sh /data/local/pixel-stack/bin/pixel-notifier-stop.sh
    health_command: pid=$(cat /data/local/pixel-stack/apps/site-notifications/run/site-notifier.pid 2>/dev/null || true); [ -n "$pid" ] && kill -0 "$pid" >/dev/null 2>&1
    redeploy:
      mode: artifact_release
      artifact_id: site-notifier-bundle
      release_root: /data/local/pixel-stack/apps/site-notifications/releases
