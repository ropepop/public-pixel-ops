services:
  android_sim:
    image: ${ARBUZAS_ANDROID_SIM_IMAGE}
    privileged: true
    tty: true
    stdin_open: true
    cpus: "${ARBUZAS_ANDROID_SIM_CPUS:-2.0}"
    mem_limit: ${ARBUZAS_ANDROID_SIM_MEMORY_LIMIT:-6g}
    memswap_limit: ${ARBUZAS_ANDROID_SIM_MEMORY_SWAP_LIMIT:-6g}
    mem_swappiness: ${ARBUZAS_ANDROID_SIM_MEMORY_SWAPPINESS:-0}
    entrypoint:
      - /bin/bash
      - -c
      - |
        set -e
        rm -rf /root/.android/avd/running/* 2>/dev/null || true
        find /data -maxdepth 3 \( -name '*.lock' -o -name '*.pid' \) -delete 2>/dev/null || true
        cd /opt
        exec /opt/start-emulator.sh
    ports:
      - 127.0.0.1:${ARBUZAS_ANDROID_SIM_CONSOLE_PORT:-15554}:5554
      - 127.0.0.1:${ARBUZAS_ANDROID_SIM_ADB_PORT:-15555}:5555
    environment:
      DISABLE_ANIMATION: "true"
      DISABLE_HIDDEN_POLICY: "true"
      SKIP_AUTH: "false"
      MEMORY: "${ARBUZAS_ANDROID_SIM_MEMORY:-4096}"
      CORES: "${ARBUZAS_ANDROID_SIM_CORES:-2}"
    devices:
      - /dev/kvm:/dev/kvm
    volumes:
      - ${ARBUZAS_ANDROID_SIM_DATA_DIR}:/data
      - /etc/arbuzas/secrets/android-adb/adbkey:/root/.android/adbkey:ro
      - /etc/arbuzas/secrets/android-adb/adbkey.pub:/root/.android/adbkey.pub:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  android_sim_tuner:
    image: arbuzas/ticket-phone-bridge:${ARBUZAS_ANDROID_SIM_RELEASE_ID}
    depends_on:
      - android_sim
    command:
      - /usr/local/bin/ticket-android-sim-tune-loop
    environment:
      TICKET_ANDROID_SIM_ADB_TARGET: android_sim:5555
      TICKET_ANDROID_SIM_STATUS_DIR: /srv/android-sim/status
      TICKET_ANDROID_SIM_APK_DIR: /srv/android-sim/apks
      TICKET_ANDROID_SIM_DISPLAY_SIZE: ${ARBUZAS_ANDROID_SIM_DISPLAY_SIZE:-540x960}
      TICKET_ANDROID_SIM_DISPLAY_DENSITY: "${ARBUZAS_ANDROID_SIM_DISPLAY_DENSITY:-220}"
    volumes:
      - /etc/arbuzas/secrets/android-adb/adbkey:/root/.android/adbkey:ro
      - /etc/arbuzas/secrets/android-adb/adbkey.pub:/root/.android/adbkey.pub:ro
      - ${ARBUZAS_ANDROID_SIM_ROOT_DIR:-/srv/arbuzas/android-sim}:/srv/android-sim
    restart: unless-stopped

  android_sim_ticket_bridge:
    image: arbuzas/ticket-phone-bridge:${ARBUZAS_ANDROID_SIM_RELEASE_ID}
    depends_on:
      - android_sim
      - android_sim_tuner
    environment:
      TICKET_PHONE_ADB_TARGET: android_sim:5555
      TICKET_PHONE_DEVICE_PORT: "9388"
      TICKET_PHONE_ADB_FORWARD_PORT: "19389"
      TICKET_PHONE_BRIDGE_PORT: "9388"
      TICKET_PHONE_RETRY_DELAY: "2"
    volumes:
      - /etc/arbuzas/secrets/android-adb/adbkey:/root/.android/adbkey:ro
      - /etc/arbuzas/secrets/android-adb/adbkey.pub:/root/.android/adbkey.pub:ro
      - ${ARBUZAS_ANDROID_SIM_APK_DIR}:/srv/android-sim/apks:ro
    restart: unless-stopped

  ticket_remote_sim:
    image: arbuzas/ticket-remote:${ARBUZAS_ANDROID_SIM_RELEASE_ID}
    depends_on:
      - android_sim_ticket_bridge
    environment:
      TZ: ${ARBUZAS_TZ:-Europe/Riga}
      TICKET_REMOTE_AUTH_MODE: dev
      TICKET_REMOTE_STATE_BACKEND: memory
      TICKET_REMOTE_BIND_ADDR: 0.0.0.0
      TICKET_REMOTE_PORT: "9338"
      TICKET_REMOTE_PUBLIC_BASE_URL: http://127.0.0.1:${ARBUZAS_ANDROID_SIM_TICKET_REMOTE_PORT:-19338}
      TICKET_REMOTE_BOOTSTRAP_ADMIN_EMAIL: ticket@jolkins.id.lv
      TICKET_REMOTE_DEV_EMAIL: ticket@jolkins.id.lv
      TICKET_REMOTE_PHONE_BACKEND_ID: android-sim
      TICKET_REMOTE_PHONE_ATTACH_NAME: Android simulator
      TICKET_REMOTE_PHONE_BASE_URL: http://android_sim_ticket_bridge:9388
      TICKET_REMOTE_COOKIE_NAME: ticket_remote_sim_session
    ports:
      - 127.0.0.1:${ARBUZAS_ANDROID_SIM_TICKET_REMOTE_PORT:-19338}:9338
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://127.0.0.1:9338/api/v1/health >/dev/null",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    restart: unless-stopped
