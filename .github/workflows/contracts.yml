name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml jsonschema
      - name: Validate contracts
        run: |
          ./tools/import/validate_contracts.py
      - name: Validate docs links
        run: |
          ./tools/docs/check_links.sh

  go-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: workloads/train-bot/go.mod
      - name: Run train-bot tests
        working-directory: workloads/train-bot
        run: |
          go test ./...

  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install site-notifications test deps
        working-directory: workloads/site-notifications
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Run site-notifications tests
        working-directory: workloads/site-notifications
        run: |
          PYTHONPATH=. pytest -q

  shell-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Shell syntax check
        run: |
          find automation/task-executor/scripts tools/import -name '*.sh' -print0 | xargs -0 -n1 bash -n
      - name: Run automation smoke test
        run: |
          ./automation/task-executor/scripts/drain_runner_smoke_test.sh
      - name: Check runtime template parity
        run: |
          ./tools/import/check_runtime_template_parity.sh
