schema: 1
module_id: ticket_remote
owner: arbuzas
runtime:
  type: external
  healthcheck: curl -fsS https://ticket.jolkins.id.lv/api/v1/health >/dev/null
  run_id_env: ARBUZAS_RELEASE_ID
components:
  - id: ticket_remote
    start: docker compose --project-name arbuzas --env-file /etc/arbuzas/current/release.env -f /etc/arbuzas/current/infra/arbuzas/docker/compose.yml up -d ticket_phone_bridge ticket_remote ticket_remote_tunnel
    stop: docker compose --project-name arbuzas --env-file /etc/arbuzas/current/release.env -f /etc/arbuzas/current/infra/arbuzas/docker/compose.yml stop ticket_remote_tunnel ticket_remote ticket_phone_bridge
    health: curl -fsS http://127.0.0.1:9338/api/v1/health >/dev/null
    redeploy:
      mode: compose_release
      release_root: /etc/arbuzas/releases
observability:
  event_source: ticket_remote
  evidence_root: ops/evidence/ticket-remote
