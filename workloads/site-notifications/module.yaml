schema: 1
module_id: site_notifier
owner: pixel-ops
runtime:
  type: service
  healthcheck: /data/local/pixel-stack/apps/site-notifications/run/site-notifier.pid
  run_id_env: PIXEL_RUN_ID
components:
  - id: site_notifier
    start: sh /data/local/pixel-stack/bin/pixel-notifier-start.sh
    stop: sh /data/local/pixel-stack/bin/pixel-notifier-stop.sh
    health: pid=$(cat /data/local/pixel-stack/apps/site-notifications/run/site-notifier.pid 2>/dev/null || true); [ -n "$pid" ] && kill -0 "$pid" >/dev/null 2>&1
    redeploy:
      mode: artifact_release
      artifact_id: site-notifier-bundle
      release_root: /data/local/pixel-stack/apps/site-notifications/releases
observability:
  event_source: site_notifications
  evidence_root: ops/evidence/site-notifications
