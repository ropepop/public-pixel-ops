schema: 1
module_id: satiksme_bot
owner: pixel-ops
runtime:
  type: service
  healthcheck: sh /data/local/pixel-stack/bin/pixel-satiksme-health.sh
  run_id_env: PIXEL_RUN_ID
components:
  - id: satiksme_bot
    start: sh /data/local/pixel-stack/bin/pixel-satiksme-start.sh
    stop: sh /data/local/pixel-stack/bin/pixel-satiksme-stop.sh
    health: sh /data/local/pixel-stack/bin/pixel-satiksme-health.sh
    redeploy:
      mode: artifact_release
      artifact_id: satiksme-bot-bundle
      release_root: /data/local/pixel-stack/apps/satiksme-bot/releases
observability:
  event_source: satiksme_bot
  evidence_root: ops/evidence/satiksme-bot
