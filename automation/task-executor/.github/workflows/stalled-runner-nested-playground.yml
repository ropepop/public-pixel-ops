name: Operation Queue Drain Nested Playground

on:
  workflow_dispatch:
    inputs:
      chain_depth:
        description: Current chain depth to start from
        required: false
        default: '0'
      chain_origin:
        description: Generation label for telemetry
        required: false
        default: gen1
      run_budget_minutes:
        description: In-run budget before continuation dispatch
        required: false
        default: '100'
      max_request_timeout_sec:
        description: Max per-request timeout cap (seconds)
        required: false
        default: '1800'
      max_iterations:
        description: Max drain iterations in this workflow run
        required: false
        default: '60'
      max_chain_depth:
        description: Safety cap for max chain depth (1-1000)
        required: false
        default: '1000'
      max_dispatch_depth:
        description: Max depth allowed for self-dispatch continuation
        required: false
        default: '999'
      backoff_base_sec:
        description: Exponential backoff base delay in seconds
        required: false
        default: '2'
      backoff_cap_sec:
        description: Exponential backoff maximum delay in seconds
        required: false
        default: '300'
      backoff_max_retries:
        description: Maximum same-run rate-limit retries for the current item
        required: false
        default: '7'
      backoff_jitter_pct:
        description: Backoff jitter percentage (0-100+)
        required: false
        default: '25'

permissions:
  actions: write
  contents: read

concurrency:
  group: operation-queue-drain-nested-playground-${{ github.ref }}
  cancel-in-progress: false

jobs:
  drain-playground:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate required secrets
        env:
          STALLED_RUNNER_BASE_URL: ${{ secrets.STALLED_RUNNER_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail
          if [ -z "${STALLED_RUNNER_BASE_URL:-}" ]; then
            echo "Missing required GitHub secret: STALLED_RUNNER_BASE_URL"
            exit 1
          fi
          if [ -z "${CRON_SECRET:-}" ]; then
            echo "Missing required GitHub secret: CRON_SECRET"
            exit 1
          fi

      - name: Drain operation queue (nested playground)
        env:
          STALLED_RUNNER_BASE_URL: ${{ secrets.STALLED_RUNNER_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          CHAIN_DEPTH_INPUT: ${{ github.event.inputs.chain_depth || '0' }}
          CHAIN_ORIGIN_INPUT: ${{ github.event.inputs.chain_origin || 'gen1' }}
          RUN_BUDGET_MINUTES_INPUT: ${{ github.event.inputs.run_budget_minutes || '100' }}
          MAX_REQUEST_TIMEOUT_SEC_INPUT: ${{ github.event.inputs.max_request_timeout_sec || '1800' }}
          MAX_ITERATIONS_INPUT: ${{ github.event.inputs.max_iterations || '60' }}
          MIN_ITERATIONS_BEFORE_CHAIN_INPUT: '2'
          MAX_CHAIN_DEPTH_INPUT: ${{ github.event.inputs.max_chain_depth || '1000' }}
          MAX_DISPATCH_DEPTH_INPUT: ${{ github.event.inputs.max_dispatch_depth || '999' }}
          BACKOFF_BASE_SEC_INPUT: ${{ github.event.inputs.backoff_base_sec || '2' }}
          BACKOFF_CAP_SEC_INPUT: ${{ github.event.inputs.backoff_cap_sec || '300' }}
          BACKOFF_MAX_RETRIES_INPUT: ${{ github.event.inputs.backoff_max_retries || '7' }}
          BACKOFF_JITTER_PCT_INPUT: ${{ github.event.inputs.backoff_jitter_pct || '25' }}
        run: |
          set -euo pipefail
          ./scripts/drain_runner.sh
